<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗記学習ポータル</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📚 暗記学習ポータル</h1>
    </header>

    <main>
        <section class="create-deck">
            <h2>単語帳を作成</h2>

            <input
                type="text"
                id="deckName"
                placeholder="単語帳名を入力">

            <button id="createBtn">
                作成
            </button>
        </section>

        <section class="deck-list">
            <h2>単語帳一覧</h2>

            <div id="decksContainer"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
