<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IFTY AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <h1>IFTY AI</h1>

    <!-- Folder -->
    <div class="section">
      <input id="folderName" placeholder="New folder name" />
      <button id="createFolderBtn">Create Folder</button>
      <select id="folderSelect"></select>
    </div>

    <!-- Word input -->
    <div class="section">
      <input id="wordInput" placeholder="Enter word" />
      <button id="generateBtn">Generate</button>
    </div>

    <!-- Card -->
    <div id="card" class="card">
      <div id="front" class="face front">WORD</div>
      <div id="back" class="face back hidden">
        <p id="meaning"></p>
        <p id="example"></p>
        <p id="ipa"></p>
        <p id="verb"></p>
      </div>
    </div>

    <!-- Controls -->
    <div class="section">
      <button id="prevBtn">Prev</button>
      <button id="nextBtn">Next</button>
      <button id="speakUS">US</button>
      <button id="speakUK">UK</button>
    </div>

    <!-- Typing -->
    <div class="section">
      <input id="typingInput" placeholder="Type word..." />
      <button id="checkBtn">Check</button>
    </div>

    <!-- Delete -->
    <div class="section">
      <input id="deleteInput" placeholder="Delete word" />
      <button id="deleteBtn">Delete</button>
      <button id="deleteCurrentBtn">Delete Current</button>
      <button id="clearBtn">Clear All</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
